services:
  - name: Asistente-Franco
    type: web
    runtime: node
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: N8N_WEBHOOK_URL
        value: https://n8n.utopiaflow.tech/webhook/franco-chat
      # Secreto: se carga en el dashboard de Render, no en el repo.
      - key: OPENAI_API_KEY
        sync: false
